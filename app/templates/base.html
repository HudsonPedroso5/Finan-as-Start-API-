<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Finanças Start{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">F$</div>
        <div>
          <h1>Finanças Start</h1>
          <p>Educação financeira</p>
        </div>
      </div>
      <nav class="nav-links">
        <a href="{{ url_for('web_bp.home') }}">Início</a>
        <a href="{{ url_for('web_bp.dashboard_page') }}">Dashboard</a>
        <a href="{{ url_for('web_bp.transactions_page') }}">Transações</a>
        <a href="{{ url_for('web_bp.goals_page') }}">Metas</a>
        <a href="{{ url_for('web_bp.learn_page') }}">Aprender</a>
        <a href="{{ url_for('web_bp.profile_page') }}">Perfil</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-soft w-100" onclick="logout()">Sair</button>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div>
          <p class="eyebrow">Controle financeiro inteligente</p>
          <h2>{% block page_title %}Finanças Start{% endblock %}</h2>
        </div>
        <div class="user-pill" id="topUser">Usuário</div>
      </header>

      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="toast" class="toast-box"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
